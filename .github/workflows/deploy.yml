name: Deploy to Cloudflare Workers

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-ecosalon
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      # Prisma generate needs a DATABASE_URL; the deployed Worker uses the D1 binding instead.
      DATABASE_URL: "file:./prisma/dev.db"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build & Deploy (OpenNext -> Cloudflare Workers)
        run: npx opennextjs-cloudflare build && npx opennextjs-cloudflare deploy
